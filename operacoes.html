<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operações e Pendências</title>
    <link rel="stylesheet" href="css/global.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .container { padding: 1.5rem; max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 1.5rem; font-weight: 700; color: var(--primary); margin-bottom: 1.5rem; }
        
        .form-op { background: #fff; padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 2rem; }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; margin-top: 1rem; }
        @media (min-width: 768px) { .form-grid { grid-template-columns: 1fr 1fr 1fr; } }
        .form-control { padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; width: 100%; background: #fff; }
        .btn-submit { background: var(--primary); color: white; border: none; padding: 0.75rem; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 1rem; }
        
        .history-list { display: flex; flex-direction: column; gap: 1rem; }
        .history-item { padding: 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .badge-type { padding: 0.25rem 0.5rem; border-radius: 6px; font-size: 0.75rem; font-weight: 700; }
        .type-ENTRADA { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .type-SAIDA { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .type-PENDENCIA { background: rgba(245, 158, 11, 0.1); color: #d97706; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Lançar Nova Operação</h1>
        
        <div class="form-op">
            <div class="form-grid">
                <div>
                    <label style="font-size:0.85rem; font-weight:600;">Produto</label>
                    <select id="op-produto" class="form-control"><option>Carregando...</option></select>
                </div>
                <div>
                    <label style="font-size:0.85rem; font-weight:600;">Tipo de Operação</label>
                    <select id="op-tipo" class="form-control">
                        <option value="PENDENCIA">PENDÊNCIA (Mercadoria Consignada/Dívida)</option>
                        <option value="ENTRADA">ENTRADA (Reposição de Estoque)</option>
                        <option value="SAIDA">SAÍDA (Venda Direta)</option>
                    </select>
                </div>
                <div>
                    <label style="font-size:0.85rem; font-weight:600;">Cliente Opcional (Para Pendências)</label>
                    <select id="op-cliente" class="form-control"><option value="">Nenhum / Venda Avulsa</option></select>
                </div>
            </div>
            
            <div class="form-grid">
                <input type="number" id="op-qtd" class="form-control" placeholder="Quantidade (Ex: 5)" min="1">
                <input type="text" id="op-obs" class="form-control" placeholder="Observação ou detalhes">
            </div>
            
            <button class="btn-submit" onclick="lancarOperacao()">Confirmar Lançamento</button>
        </div>

        <h1>Últimos Lançamentos / Pendências</h1>
        <div class="history-list" id="lista-movimentacoes">
            <p style="color: var(--text-muted);">Carregando histórico...</p>
        </div>
    </div>

    <!-- Barra de Navegação -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Home</span>
        </a>
        <a href="operacoes.html" class="nav-item active">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
            <span>Operações</span>
        </a>
        <a href="clientes.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            <span>Clientes</span>
        </a>
        <a href="estoque.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-5 14H4v-4h11v4zm0-5H4V9h11v4zm5 5h-4V9h4v9z"/></svg>
            <span>Estoque</span>
        </a>
    </nav>

    <script src="js/supabase-config.js"></script>
    <script>
        async function inicializarTela() {
            // Puxa os produtos para o Select
            const { data: prods } = await _supabase.from('produtos').select('id, nome').order('nome');
            const selectProd = document.getElementById('op-produto');
            selectProd.innerHTML = prods.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');

            // Puxa os clientes para o Select
            const { data: clis } = await _supabase.from('clientes').select('id, nome, apelido').order('nome');
            const selectCli = document.getElementById('op-cliente');
            selectCli.innerHTML = '<option value="">Nenhum / Venda Avulsa</option>' + clis.map(c => `<option value="${c.id}">${c.nome} ${c.apelido ? `(${c.apelido})`:''}</option>`).join('');

            carregarMovimentacoes();
        }

        async function carregarMovimentacoes() {
            const { data, error } = await _supabase
                .from('movimentacoes')
                .select('*, produtos(nome), clientes(nome, apelido)')
                .order('created_at', { ascending: false });

            if(error) return console.error(error);

            const lista = document.getElementById('lista-movimentacoes');
            lista.innerHTML = data.length === 0 ? '<p style="color:var(--text-muted);">Nenhuma movimentação registrada.</p>' : '';

            data.forEach(mov => {
                const clienteNome = mov.clientes ? ` -> Destino: ${mov.clientes.nome}` : '';
                lista.innerHTML += `
                    <div class="history-item">
                        <div>
                            <strong style="font-size:1rem;">${mov.produtos?.nome || 'Produto Removido'} (Qtd: ${mov.quantidade})</strong>
                            <p style="font-size:0.85rem; color:var(--text-muted); margin-top:4px;">${mov.observacao || 'Sem obs.'} ${clienteNome}</p>
                        </div>
                        <span class="badge-type type-${mov.tipo}">${mov.tipo}</span>
                    </div>
                `;
            });
        }

        async function lancarOperacao() {
            const produto_id = document.getElementById('op-produto').value;
            const tipo = document.getElementById('op-tipo').value;
            const cliente_id = document.getElementById('op-cliente').value || null;
            const quantidade = parseInt(document.getElementById('op-qtd').value);
            const observacao = document.getElementById('op-obs').value.trim();

            if(!quantidade || quantidade <= 0) return alert('Informe uma quantidade válida!');

            // Busca a quantidade atual do produto para atualizar o estoque principal
            const { data: prod } = await _supabase.from('produtos').select('quantidade_atual').eq('id', produto_id).single();
            let novaQtd = prod.quantidade_atual;

            if (tipo === 'ENTRADA') novaQtd += quantidade;
            else novaQtd -= quantidade;

            if (novaQtd < 0) return alert('Operação cancelada! O estoque não pode ficar negativo.');

            // Atualiza a tabela de produtos
            await _supabase.from('produtos').update({ quantidade_atual: novaQtd, updated_at: new Date() }).eq('id', produto_id);

            // Insere na tabela de movimentações
            const { error } = await _supabase.from('movimentacoes').insert([{
                produto_id, cliente_id, tipo, quantidade, observacao, usuario_nome: 'Operador'
            }]);

            if(error) {
                alert('Erro ao registrar operação.');
            } else {
                document.getElementById('op-qtd').value = '';
                document.getElementById('op-obs').value = '';
                alert('Operação realizada com sucesso!');
                carregarMovimentacoes();
            }
        }

        inicializarTela();
    </script>
</body>
</html>
