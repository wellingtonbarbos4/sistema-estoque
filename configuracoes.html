<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações Administrativas</title>
    <link rel="stylesheet" href="css/global.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .box-adm { display: none; margin-top: 1.5rem; }
        .user-card { display: flex; justify-content: space-between; padding: 0.75rem; border: 1px solid var(--border); border-radius: var(--radius-sm); margin-top: 0.5rem; background: #fff; }
        .badge { padding: 0.2rem 0.5rem; font-size: 0.75rem; font-weight: 700; border-radius: 4px; background: #f1f5f9;}
    </style>
</head>
<body>
    <div class="container">
        <h1>Configurações do Sistema</h1>
        <p>Gerencie parâmetros e permissões de funcionários.</p>

        <div id="lock-msg" class="card" style="margin-top: 1.5rem; background: #fef2f2; border-color: #fca5a5; color: var(--danger);">
            ⚠️ Acesso Restrito. Apenas usuários com nível de <strong>GERENTE</strong> podem cadastrar operadores.
        </div>

        <div id="panel-adm" class="box-adm">
            <div class="card">
                <h3>Cadastrar Novo Operador / Gerente</h3>
                <div style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem;">
                    <input type="text" id="new-username" class="form-control" placeholder="Nome de Usuário (Ex: joao.operador)">
                    <input type="password" id="new-password" class="form-control" placeholder="Senha de Acesso">
                    <select id="new-role" class="form-control">
                        <option value="OPERADOR">Nível: OPERADOR (Acesso Padrão)</option>
                        <option value="GERENTE">Nível: GERENTE (Acesso Total)</option>
                    </select>
                    <button class="btn-primary" onclick="criarUsuario()">Salvar Novo Usuário</button>
                </div>
            </div>

            <h3 style="margin-top: 2rem;">Operadores Cadastrados</h3>
            <div id="lista-usuarios" style="margin-top: 0.5rem;"></div>
        </div>

        <button class="btn-primary" style="background:var(--danger); margin-top: 2rem;" onclick="logout()">Desconectar Sistema</button>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Home</span></a>
        <a href="operacoes.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg><span>Operações</span></a>
        <a href="clientes.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg><span>Clientes</span></a>
        <a href="estoque.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-5 14H4v-4h11v4zm0-5H4V9h11v4zm5 5h-4V9h4v9z"/></svg><span>Estoque</span></a>
        <a href="configuracoes.html" class="nav-item active"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg><span>Ajustes</span></a>
    </nav>

    <script src="js/supabase-config.js"></script>
    <script>
        const role = localStorage.getItem('app_role');
        if(role === 'GERENTE') {
            document.getElementById('lock-msg').style.display = 'none';
            document.getElementById('panel-adm').style.display = 'block';
            listarUsuarios();
        }

        async function listarUsuarios() {
            const { data } = await _supabase.from('usuarios').select('username, role');
            const box = document.getElementById('lista-usuarios');
            box.innerHTML = data.map(u => `
                <div class="user-card">
                    <span><strong>${u.username}</strong></span>
                    <span class="badge">${u.role}</span>
                </div>
            `).join('');
        }

        async function criarUsuario() {
            const username = document.getElementById('new-username').value.trim();
            const password = document.getElementById('new-password').value.trim();
            const roleSelected = document.getElementById('new-role').value;

            if(!username || !password) return alert('Insira usuário e senha!');

            const { error } = await _supabase.from('usuarios').insert([{ username, password, role: roleSelected }]);
            
            if(error) {
                alert('Erro ou usuário já existente.');
            } else {
                alert('Funcionário registrado com sucesso!');
                document.getElementById('new-username').value = '';
                document.getElementById('new-password').value = '';
                listarUsuarios();
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
