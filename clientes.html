<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes</title>
    <link rel="stylesheet" href="css/global.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .container { padding: 1.5rem; max-width: 1200px; margin: 0 auto; }
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .header-actions h1 { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
        .btn-primary { background: var(--accent); color: white; border: none; padding: 0.75rem 1.25rem; border-radius: 8px; font-weight: 600; cursor: pointer; }
        
        .form-add { display: none; margin-bottom: 1.5rem; background: #fff; padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; margin-bottom: 1rem; }
        @media (min-width: 768px) { .form-grid { grid-template-columns: 1fr 1fr 1fr; } }
        .form-control { padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; width: 100%; }
        
        .client-list { display: flex; flex-direction: column; gap: 1rem; }
        .client-item { padding: 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .client-info h3 { font-size: 1rem; color: var(--text-main); }
        .client-info p { font-size: 0.85rem; color: var(--text-muted); margin-top: 2px; }
        .badge-phone { background: #f1f5f9; padding: 0.25rem 0.5rem; border-radius: 6px; font-size: 0.85rem; font-weight: 600; text-decoration: none; color: var(--accent); }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-actions">
            <h1>Clientes</h1>
            <button class="btn-primary" onclick="toggleForm()">+ Novo Cliente</button>
        </div>

        <!-- Formulário Oculto -->
        <div id="box-form" class="form-add">
            <h3>Cadastrar Novo Cliente</h3>
            <div class="form-grid" style="margin-top: 1rem;">
                <input type="text" id="cli-nome" class="form-control" placeholder="Nome Completo">
                <input type="text" id="cli-apelido" class="form-control" placeholder="Apelido / Empresa">
                <input type="text" id="cli-telefone" class="form-control" placeholder="Telefone (DDD + Número)">
            </div>
            <button class="btn-primary" onclick="salvarCliente()">Salvar Cliente</button>
        </div>

        <!-- Lista de Clientes -->
        <div class="client-list" id="lista-clientes">
            <p style="color: var(--text-muted);">Carregando clientes...</p>
        </div>
    </div>

    <!-- Barra de Navegação -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Home</span>
        </a>
        <a href="operacoes.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
            <span>Operações</span>
        </a>
        <a href="clientes.html" class="nav-item active">
            <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            <span>Clientes</span>
        </a>
        <a href="estoque.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-5 14H4v-4h11v4zm0-5H4V9h11v4zm5 5h-4V9h4v9z"/></svg>
            <span>Estoque</span>
        </a>
    </nav>

    <script src="js/supabase-config.js"></script>
    <script>
        function toggleForm() {
            const form = document.getElementById('box-form');
            form.style.display = form.style.display === 'block' ? 'none' : 'block';
        }

        async function carregarClientes() {
            const { data, error } = await _supabase
                .from('clientes')
                .select('*')
                .order('nome', { ascending: true });

            if (error) return console.error(error);

            const lista = document.getElementById('lista-clientes');
            lista.innerHTML = '';

            if(data.length === 0) {
                lista.innerHTML = `<p style="color: var(--text-muted);">Nenhum cliente cadastrado.</p>`;
                return;
            }

            data.forEach(cli => {
                lista.innerHTML += `
                    <div class="client-item">
                        <div class="client-info">
                            <h3>${cli.nome} ${cli.apelido ? `(${cli.apelido})` : ''}</h3>
                            <p>Cadastrado em: ${new Date(cli.created_at).toLocaleDateString('pt-BR')}</p>
                        </div>
                        <div>
                            ${cli.telefone ? `<a href="https://wa.me/55${cli.telefone.replace(/\D/g,'')}" target="_blank" class="badge-phone">WhatsApp</a>` : '<span style="color:var(--text-muted); font-size:0.8rem;">Sem Tel</span>'}
                        </div>
                    </div>
                `;
            });
        }

        async function salvarCliente() {
            const nome = document.getElementById('cli-nome').value.trim();
            const apelido = document.getElementById('cli-apelido').value.trim();
            const telefone = document.getElementById('cli-telefone').value.trim();

            if(!nome) return alert('O nome do cliente é obrigatório!');

            const { error } = await _supabase
                .from('clientes')
                .insert([{ nome, apelido, telefone }]);

            if (error) {
                alert('Erro ao salvar cliente.');
            } else {
                document.getElementById('cli-nome').value = '';
                document.getElementById('cli-apelido').value = '';
                document.getElementById('cli-telefone').value = '';
                toggleForm();
                carregarClientes();
            }
        }

        carregarClientes();
    </script>
</body>
</html>
